spring:
  application:
    name: appbit

  http:
    converters:
      preferred-json-mapper: jackson2

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:disabled}
            client-secret: ${GOOGLE_CLIENT_SECRET:disabled}
            scope: email,profile

  data:
    redis:
      repositories:
        enabled: false

  datasource:
    primary:
      jdbc-url: jdbc:mysql://${DB_HOST_APPBIT:localhost}:${DB_PORT_APPBIT:3306}/${DB_NAME_APPBIT:appbit}?sslMode=${DB_SSL_MODE:DISABLED}&allowPublicKeyRetrieval=true
      username: ${DB_USER_APPBIT:root}
      password: ${DB_PASSWORD_APPBIT:123Global!}
      driver-class-name: com.mysql.cj.jdbc.Driver
    replica:
      jdbc-url: jdbc:mysql://${DB_REPLICA_HOST:localhost}:${DB_REPLICA_PORT:3306}/${DB_REPLICA_NAME:appbit}?sslMode=${DB_SSL_MODE:DISABLED}&allowPublicKeyRetrieval=true
      username: ${DB_REPLICA_USER:root}
      password: ${DB_REPLICA_PASSWORD:123Global!}
      driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    out-of-order: false
    validate-on-migrate: false

jwt:
  secret: ${JWT_SECRET:97c4e511488e02bf17dbec1451d0879e64e526487e411ea3ad858db4d94cd2f3}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 h (padrão)

logging:
  structured:
    format:
      console: ${LOGGING_STRUCTURED_FORMAT:}
  level:
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  health:
    redis:
      enabled: false
