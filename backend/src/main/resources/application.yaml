spring:
  application:
    name: appbit

  http:
    converters:
      preferred-json-mapper: jackson2

  datasource:
    url: jdbc:mysql://${DB_HOST_APPBIT}:${DB_PORT_APPBIT}/${DB_NAME_APPBIT}
    username: ${DB_USER_APPBIT}
    password: ${DB_PASSWORD_APPBIT}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    out-of-order: true

jwt:

  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 h (padrão)