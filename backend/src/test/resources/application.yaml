spring:
  datasource:
    url: jdbc:h2:mem:appbit;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate.dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  security:
    user:
      name: testuser
      password: testpass

jwt:
  secret: test-secret-key-for-testing-only-very-long-key
  expiration: 86400000

logging:
  level:
    root: WARN
    br.com.appbit: DEBUG
