spring:
  application:
    name: appbit

  http:
    converters:
      preferred-json-mapper: jackson2

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  flyway:
    enabled: false 

jwt:
  secret: test-secret-appbit-minimo-32-caracteres-ok
  expiration-ms: 3600000