services:
  - type: web
    name: appbit-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST_APPBIT
        sync: false
      - key: DB_PORT_APPBIT
        value: "3306"
      - key: DB_NAME_APPBIT
        sync: false
      - key: DB_USER_APPBIT
        sync: false
      - key: DB_PASSWORD_APPBIT
        sync: false
      - key: DB_SSL_MODE
        value: DISABLED
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://appbit-frontend.onrender.com

  - type: static
    name: appbit-frontend
    rootDir: .
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://appbit-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
